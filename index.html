<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Deur Bediening</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg:       #ffffff;
  --card:     #f9fafb;
  --border:   #e5e7eb;
  --border2:  #d1d5db;
  --text:     #111827;
  --muted:    #6b7280;
  --muted2:   #9ca3af;
  --green:    #22c55e;
  --red:      #ef4444;
  --amber:    #f59e0b;
  --blue:     #22c55e;
  --ggreen:   rgba(34,197,94,0.12);
  --gred:     rgba(239,68,68,0.12);
  --gamber:   rgba(245,158,11,0.12);
  --gblue:    rgba(34,197,94,0.12);
}

/* === REST VAN JE CSS 100% ONGEWIJZIGD === */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  padding: 20px 16px 40px;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(34,197,94,0.06), transparent);
  pointer-events:none;
}

.page { max-width: 420px; margin: 0 auto; position: relative; z-index:1; }

/* LOGIN */
#loginScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 100vh;
  padding-bottom: 40px;
}

.login-header { text-align: center; margin-bottom: 32px; }
.login-header .lock-icon { font-size: 36px; margin-bottom: 12px; display: block; opacity: 0.9; }
.login-header h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.login-header p { font-size: 13px; color: var(--muted2); }

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
}

.field { margin-bottom: 14px; }
.field label { font-size: 11px; color: var(--muted2); margin-bottom: 6px; display:block; }
.field input {
  width:100%; background:var(--bg); border:1px solid var(--border2);
  border-radius:8px; padding:11px 12px; color:var(--text);
}

.remember-row { display:flex; align-items:center; gap:10px; margin-bottom:20px; cursor:pointer; }
.custom-checkbox {
  width:18px;height:18px;border:1px solid var(--border2);
  border-radius:5px;background:var(--bg);display:flex;align-items:center;justify-content:center;
}
.custom-checkbox.checked { background: var(--blue); }
.custom-checkbox .check-icon { opacity:0;color:white; }
.custom-checkbox.checked .check-icon { opacity:1; }

.login-btn {
  width:100%; padding:13px; background:var(--blue);
  color:white; border:none; border-radius:9px; font-weight:600; cursor:pointer;
}

.login-error {
  margin-top:12px; padding:10px;
  background:var(--gred); border-radius:8px;
  font-size:12px; color:var(--red); display:none;
}
.login-error.show { display:block; }

#appScreen { display:none; }

.header {
  display:flex; justify-content:space-between;
  margin-bottom:20px; padding-bottom:16px;
  border-bottom:1px solid var(--border);
}

.conn-badge {
  display:flex; gap:6px;
  padding:5px 10px; border-radius:20px;
  border:1px solid var(--border);
  font-size:12px;
}
.conn-badge.connected { color:var(--green); }
.conn-badge.error { color:var(--red); }

.conn-dot {
  width:6px;height:6px;border-radius:50%;
  background:var(--muted);
}
.conn-badge.connected .conn-dot { background:var(--green); }
.conn-badge.error .conn-dot { background:var(--red); }

.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
}

.card-title { font-size:11px; color:var(--muted2); margin-bottom:14px; }

.log { font-size:11px; margin-top:12px; }
.log.ok { color:var(--green); }
.log.err { color:var(--red); }
.log.warn { color:var(--amber); }

</style>
</head>

<body>
<div class="page">

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-header">
    <span class="lock-icon">🔐</span>
    <h1>Deur Bediening</h1>
    <p>Log in met je account</p>
  </div>

  <div class="login-card">
    <div class="field">
      <label>Gebruikersnaam</label>
      <input type="text" id="inputUser">
    </div>

    <div class="field">
      <label>Wachtwoord</label>
      <input type="password" id="inputPass">
    </div>

    <div class="remember-row" onclick="toggleRemember()">
      <div class="custom-checkbox" id="rememberBox">
        <span class="check-icon">✓</span>
      </div>
      <span>Onthoud mij</span>
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">Verbinden</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="header">
    <div class="conn-badge" id="connBadge">
      <div class="conn-dot"></div>
      <span id="connLabel">Verbinden</span>
    </div>
    <button onclick="doLogout()">Uitloggen</button>
  </div>

  <div class="card">
    <div class="card-title">Status</div>
    <div class="log" id="log">Verbinding opzetten...</div>
  </div>
</div>

</div>

<script>
const FIXED_HOST = "b50882be934647908aa15c55b814bd3b.s1.eu.hivemq.cloud";
const PORT = 8884;
const TOPIC_STATUS = 'deur/status';
const STORAGE_KEY = 'deurapp_creds';

let client;
let connected = false;
let rememberMe = false;
let lastMessageTime = 0;
let watchdogTimer = null;

/* UI helpers */
function setConn(state, label) {
  const badge = document.getElementById('connBadge');
  badge.className = 'conn-badge ' + state;
  document.getElementById('connLabel').textContent = label;
}

function setLog(msg, cls='') {
  const el = document.getElementById('log');
  el.textContent = msg;
  el.className = 'log ' + cls;
}

/* remember */
function toggleRemember(){
  rememberMe=!rememberMe;
  document.getElementById('rememberBox').className =
    'custom-checkbox'+(rememberMe?' checked':'');
}

/* login */
function doLogin(){
  const user = inputUser.value.trim();
  const pass = inputPass.value;

  if(!user || !pass){
    showError("Vul alles in");
    return;
  }

  connectMQTT(FIXED_HOST,user,pass,()=>{
    if(rememberMe) localStorage.setItem(STORAGE_KEY,JSON.stringify({user,pass}));
    loginScreen.style.display="none";
    appScreen.style.display="block";
  },err=>{
    showError(err);
  });
}

function showError(msg){
  const el = loginError;
  el.textContent = msg;
  el.className="login-error show";
}

/* watchdog */
function startWatchdog() {
  if (watchdogTimer) clearInterval(watchdogTimer);

  watchdogTimer = setInterval(() => {
    const now = Date.now();
    if (connected && now - lastMessageTime > 10000) {
      setConn('error','Offline');
      setLog('Geen data ontvangen (ESP offline)','err');
    }
  }, 2000);
}

/* mqtt */
function connectMQTT(host,user,pass,ok,fail){
  client = mqtt.connect(`wss://${host}:${PORT}/mqtt`,{
    username:user,password:pass,
    reconnectPeriod:3000
  });

  client.on('connect',()=>{
    connected = true;
    setConn('connected','Verbonden');
    setLog('Verbonden ✓','ok');
    client.subscribe(TOPIC_STATUS);
    startWatchdog();
    ok();
  });

  client.on('message',(topic,payload)=>{
    lastMessageTime = Date.now();
    setConn('connected','Verbonden');
  });

  client.on('reconnect',()=>{
    setConn('','Herverbinden');
    setLog('Herverbinden...','warn');
    connected = false;
  });

  client.on('offline',()=>{
    setConn('error','Offline');
    setLog('Verbinding verloren','err');
    connected = false;
  });

  client.on('close',()=>{
    setConn('error','Offline');
    setLog('Verbinding gesloten','err');
    connected = false;
  });

  client.on('error',e=>{
    fail(e.message);
  });
}

/* logout */
function doLogout(){
  if(client) client.end(true);
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

/* autologin */
(function(){
  const s = localStorage.getItem(STORAGE_KEY);
  if(s){
    const d = JSON.parse(s);
    inputUser.value=d.user;
    inputPass.value=d.pass;
    rememberMe=true;
    toggleRemember();
    doLogin();
  }
})();
</script>

</body>
</html>
