<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Deur Bediening</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<style>
/* (ALLE CSS IS ONGEWIJZIGD) */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root { --bg:#0f1117; --card:#161b27; --border:#1e2535; --border2:#252d40; --text:#e2e8f0; --muted:#4a5568; --muted2:#718096; --green:#10b981; --red:#ef4444; --amber:#f59e0b; --blue:#3b82f6; --ggreen:rgba(16,185,129,0.12); --gred:rgba(239,68,68,0.12); --gamber:rgba(245,158,11,0.12); --gblue:rgba(59,130,246,0.12);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:20px 16px 40px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59,130,246,0.06), transparent);pointer-events:none;}
.page{max-width:420px;margin:0 auto;position:relative;z-index:1;}
/* (rest CSS exact hetzelfde als origineel) */
</style>
</head>
<body>
<div class="page">

<div id="loginScreen">
  <div class="login-header">
    <span class="lock-icon">🔐</span>
    <h1>Deur Bediening</h1>
    <p>Voer je HiveMQ inloggegevens in</p>
  </div>

  <div class="login-card">

    <!-- HOST VELD VERWIJDERD -->

    <div class="field">
      <label>Gebruikersnaam</label>
      <input type="text" id="inputUser" placeholder="gebruikersnaam">
    </div>

    <div class="field">
      <label>Wachtwoord</label>
      <input type="password" id="inputPass" placeholder="••••••••••">
    </div>

    <div class="remember-row" onclick="toggleRemember()">
      <div class="custom-checkbox" id="rememberBox">
        <span class="check-icon">✓</span>
      </div>
      <span>Onthoud mij op dit apparaat</span>
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">Verbinden</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="appScreen">
<!-- (HELE APP GEDEELTE IS ONGEWIJZIGD) -->
</div>

</div>

<script>
const HOST = 'b50882be934647908aa15c55b814bd3b.s1.eu.hivemq.cloud';
const PORT = 8884;
const TOPIC_CMD = 'deur/command';
const TOPIC_STATUS = 'deur/status';
const STORAGE_KEY = 'deurapp_creds';

let client, connected=false, autoOn=false, setTemp=22.0, rememberMe=false;

function toggleRemember(){rememberMe=!rememberMe;document.getElementById('rememberBox').className='custom-checkbox'+(rememberMe?' checked':'');}

function saveCredentials(user,pass){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({user,pass}))}catch(e){}
}
function loadCredentials(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))}catch(e){return null}
}
function clearCredentials(){try{localStorage.removeItem(STORAGE_KEY)}catch(e){}}

function showLoginError(msg){
  const el=document.getElementById('loginError');
  el.textContent=msg;
  el.className='login-error show';
}
function hideLoginError(){document.getElementById('loginError').className='login-error';}

function doLogin(){
  hideLoginError();
  const user=document.getElementById('inputUser').value.trim();
  const pass=document.getElementById('inputPass').value;

  if(!user){showLoginError('Vul een gebruikersnaam in.');return;}
  if(!pass){showLoginError('Vul een wachtwoord in.');return;}

  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginBtn').textContent='Verbinden...';

  connectMQTT(user,pass,()=>{
    if(rememberMe)saveCredentials(user,pass);
    showApp();
  },err=>{
    showLoginError('Verbinding mislukt: '+err);
    document.getElementById('loginBtn').disabled=false;
    document.getElementById('loginBtn').textContent='Verbinden';
  });
}

function doLogout(){
  if(client){try{client.end(true)}catch(e){}}
  clearCredentials();
  connected=false;
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('inputPass').value='';
}

function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
}

function connectMQTT(user,pass,onSuccess,onError){
  const id='web_'+Math.random().toString(16).slice(2,8);
  let resolved=false;

  client=mqtt.connect(`wss://${HOST}:${PORT}/mqtt`,{
    clientId:id,username:user,password:pass,clean:true,reconnectPeriod:0,connectTimeout:10000
  });

  client.on('connect',()=>{
    if(resolved)return;
    resolved=true;
    connected=true;
    client.options.reconnectPeriod=3000;
    onSuccess();
  });

  client.on('error',e=>{
    if(!resolved){resolved=true;onError(e.message);return;}
    connected=false;
  });
}

(function init(){
  const saved=loadCredentials();
  if(saved){
    document.getElementById('inputUser').value=saved.user;
    document.getElementById('inputPass').value=saved.pass;
    rememberMe=true;
    document.getElementById('rememberBox').className='custom-checkbox checked';
    doLogin();
  }
})();
</script>
</body>
</html>
